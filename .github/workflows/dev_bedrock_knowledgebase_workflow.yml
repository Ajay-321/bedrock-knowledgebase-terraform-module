name: dev_bedrock_knowledgebase_workflow

on:
  workflow_dispatch:
    inputs:
      tf_apply:
        description: run terraform apply
        default: 'false'
  push:
    paths:
      - '.github/workflows/dev_bedrock_knowledgebase_workflow.yml'
      - 'environments/dev/us-east-1/**'
      - 'modules/**'
      - 'bedrock_knowledgebase_docs/**'

permissions:
  id-token: write
  contents: read


jobs:
  Terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.Actions_IAM_Role_Arn }}
          aws-region: us-east-1
  

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.12  

      - name: Terraform Format
        run: terraform fmt -recursive -check -diff -write=false .

      - name: Terraform Init
        run: |
          cd environments/dev/us-east-1 && terraform init

      - name: Terraform Plan
        run: cd environments/dev/us-east-1 && terraform plan -input=false 

      - name: Terraform Apply
        if: ((github.ref == 'refs/heads/main' && github.event_name == 'push')||(github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && github.event.inputs.tf_apply == 'true'))
        run: cd environments/dev/us-east-1 && terraform apply -auto-approve -input=false